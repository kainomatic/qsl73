name: Release

# Trigger: Push eines Versions-Tags
#   vX.Y.Z        → Stable-Release  (z. B. v0.1.0)
#   vX.Y.Z-betaN  → Beta-Pre-Release (z. B. v0.1.0-beta1)
# Kein Tag = kein Lauf. CI für normale Pushes: .github/workflows/ci.yml
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release (${{ github.ref_name }})
    runs-on: windows-latest

    permissions:
      contents: write   # Für Release-Erstellung und Asset-Upload

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Repository auschecken
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Kanal + Release-Typ aus Tag-Name bestimmen
      # ------------------------------------------------------------------
      - name: Kanal und Release-Typ aus Tag bestimmen
        id: channel
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '-beta') {
            "CHANNEL=beta"               >> $env:GITHUB_ENV
            "IS_PRERELEASE=true"         >> $env:GITHUB_ENV
            "ISS_FILE=installer\qsl73-beta.iss" >> $env:GITHUB_ENV
            "SETUP_FILE=installer\Output\QSL73-Beta-Setup.exe" >> $env:GITHUB_ENV
            Write-Host "Kanal: beta (Pre-Release)"
          } else {
            "CHANNEL=stable"             >> $env:GITHUB_ENV
            "IS_PRERELEASE=false"        >> $env:GITHUB_ENV
            "ISS_FILE=installer\qsl73.iss" >> $env:GITHUB_ENV
            "SETUP_FILE=installer\Output\QSL73-Setup.exe" >> $env:GITHUB_ENV
            Write-Host "Kanal: stable (Release)"
          }

      # ------------------------------------------------------------------
      # 3. Versions-Sync prüfen: Tag muss mit __version__.py übereinstimmen
      # ------------------------------------------------------------------
      - name: Versions-Sync prüfen (Tag == __version__.py)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # Versions-Nummer aus Tag extrahieren (v0.1.0 oder v0.1.0-beta1 → 0.1.0)
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)') {
            Write-Error "Ungültiges Tag-Format: $tag (erwartet: vX.Y.Z oder vX.Y.Z-betaN)"
            exit 1
          }
          $tagVer = $Matches[1]

          $content = Get-Content src\qsl73\__version__.py -Raw
          if ($content -notmatch '__version__\s*=\s*"([^"]+)"') {
            Write-Error "__version__ nicht in src\qsl73\__version__.py gefunden"
            exit 1
          }
          $srcVer = $Matches[1]

          if ($tagVer -ne $srcVer) {
            Write-Error "Versions-Mismatch: Tag $tag (→ $tagVer) != __version__.py ($srcVer)"
            Write-Error "Lösung: __version__.py auf $tagVer setzen, committen, dann Tag neu setzen."
            exit 1
          }
          "APP_VERSION=$srcVer" >> $env:GITHUB_ENV
          Write-Host "OK: Tag $tag stimmt mit __version__.py ($srcVer) überein."

      # ------------------------------------------------------------------
      # 4. Python 3.12 (ADR-0024)
      # ------------------------------------------------------------------
      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ------------------------------------------------------------------
      # 5. Abhängigkeiten + PyInstaller installieren
      # ------------------------------------------------------------------
      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ------------------------------------------------------------------
      # 6. Icon erzeugen
      # ------------------------------------------------------------------
      - name: Windows-Icon erzeugen
        run: python tools/make_icon.py

      # ------------------------------------------------------------------
      # 7. CHANNEL für Beta-Build in __version__.py patchen
      #    (ephemere Änderung nur in diesem CI-Lauf — kein Commit)
      # ------------------------------------------------------------------
      - name: CHANNEL auf beta setzen (nur Beta-Build)
        if: env.CHANNEL == 'beta'
        shell: pwsh
        run: |
          $f = 'src\qsl73\__version__.py'
          (Get-Content $f) -replace 'CHANNEL = "stable"', 'CHANNEL = "beta"' |
            Set-Content $f -Encoding utf8
          Write-Host "CHANNEL in __version__.py auf 'beta' gesetzt."

      # ------------------------------------------------------------------
      # 8. PyInstaller-Bundle bauen
      # ------------------------------------------------------------------
      - name: PyInstaller-Bundle bauen
        run: pyinstaller qsl73.spec

      # ------------------------------------------------------------------
      # 9. Inno Setup installieren
      # ------------------------------------------------------------------
      - name: Inno Setup installieren
        run: choco install innosetup --no-progress -y

      # ------------------------------------------------------------------
      # 10. Installer bauen (Stable oder Beta)
      # ------------------------------------------------------------------
      - name: Installer bauen
        shell: pwsh
        run: |
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          Write-Host "Baue: ${{ env.ISS_FILE }} mit APP_VERSION=${{ env.APP_VERSION }}"
          & $iscc /DAPP_VERSION=${{ env.APP_VERSION }} ${{ env.ISS_FILE }}
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC fehlgeschlagen (Exit $LASTEXITCODE)"
            exit $LASTEXITCODE
          }
          Write-Host "Installer: ${{ env.SETUP_FILE }}"

      # ------------------------------------------------------------------
      # 11. Release-Notes aus CHANGELOG.md extrahieren
      # ------------------------------------------------------------------
      - name: Release-Notes aus CHANGELOG generieren
        shell: pwsh
        run: |
          $changelog = Get-Content CHANGELOG.md -Raw -Encoding utf8
          # Inhalt zwischen ## [Unreleased] und nächster ## [-Zeile
          $match = [regex]::Match(
            $changelog,
            '## \[Unreleased\]\s*\r?\n(.*?)(?=\r?\n## \[)',
            [System.Text.RegularExpressions.RegexOptions]::Singleline
          )
          if ($match.Success) {
            $notes = $match.Groups[1].Value.Trim()
          } else {
            $notes = "Siehe CHANGELOG.md für Details zu dieser Version."
          }
          $header = "## QSL73 ${{ env.APP_VERSION }}`n"
          ($header + $notes) | Out-File -FilePath release_notes.txt -Encoding utf8
          Write-Host "Release-Notes erzeugt."

      # ------------------------------------------------------------------
      # 12. GitHub-Release erstellen und Setup.exe anhängen
      # ------------------------------------------------------------------
      - name: GitHub-Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.SETUP_FILE }}
          prerelease: ${{ env.IS_PRERELEASE }}
          body_path: release_notes.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
